<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Private Boxing Zürich – Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #cdd1d9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 80px;
    flex-wrap: wrap;
    padding: 60px;
  }
  .card {
    padding: 60px 70px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card.light { background: #eaedf2; }
  .card.dark  { background: #07101f; }
</style>
</head>
<body>

<!-- LIGHT -->
<div class="card light">
<svg width="340" height="490" viewBox="0 0 340 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="oval-l">
      <!-- Oval: wider than tall, like the sketch -->
      <ellipse cx="170" cy="162" rx="155" ry="148"/>
    </clipPath>
    <linearGradient id="bar-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4e8ff"/>
    </linearGradient>
    <!-- 14 diagonal: barely visible -->
    <linearGradient id="diag-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a0ccff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5090e0" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow-l">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#04184a" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- OVAL BADGE (like sketch) -->
  <ellipse cx="170" cy="162" rx="160" ry="153" fill="#0b2860" filter="url(#shadow-l)"/>
  <ellipse cx="170" cy="162" rx="153" ry="146" fill="none" stroke="#1e54c2" stroke-width="3.5"/>
  <ellipse cx="170" cy="162" rx="143" ry="136" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>

  <!-- SYMBOL clipped to oval -->
  <g clip-path="url(#oval-l)">

    <!-- Shadow -->
    <g fill="rgba(0,0,0,0.25)" transform="translate(4,6)">
      <rect x="96"  y="38"  width="42" height="248" rx="5"/>
      <rect x="202" y="38"  width="42" height="248" rx="5"/>
      <rect x="58"  y="112" width="224" height="42" rx="5"/>
      <rect x="58"  y="182" width="224" height="42" rx="5"/>
    </g>

    <!-- Main bars: B · H · Z visible, 14 hidden -->
    <g fill="url(#bar-l)">
      <!-- LEFT VERTICAL  — "1" hidden · left of B · left of H -->
      <rect x="96"  y="38"  width="42" height="248" rx="5"/>
      <!-- RIGHT VERTICAL — part of "4" hidden · right of H -->
      <rect x="202" y="38"  width="42" height="248" rx="5"/>
      <!-- TOP HORIZONTAL — top of Z · top of B · crossbar top of H -->
      <rect x="58"  y="112" width="224" height="42" rx="5"/>
      <!-- BOTTOM HORIZONTAL — bottom of Z · bottom of B -->
      <rect x="58"  y="182" width="224" height="42" rx="5"/>
    </g>

    <!-- 14 diagonal: very subtle (like in sketch — barely there) -->
    <line
      x1="238" y1="36"
      x2="102" y2="286"
      stroke="url(#diag-l)"
      stroke-width="36"
      stroke-linecap="square"
    />

    <!-- Depth engraving -->
    <g stroke="rgba(3,16,60,0.14)" stroke-width="2.5" fill="none">
      <rect x="101" y="43"  width="32" height="238" rx="4"/>
      <rect x="207" y="43"  width="32" height="238" rx="4"/>
      <rect x="63"  y="117" width="214" height="32" rx="4"/>
      <rect x="63"  y="187" width="214" height="32" rx="4"/>
    </g>

    <!-- Clean up gaps between bars (background fill) -->
    <rect x="138" y="38"  width="64" height="74"  fill="#0b2860"/>
    <rect x="138" y="224" width="64" height="62"  fill="#0b2860"/>

  </g>

  <!-- TEXT -->
  <text x="170" y="354"
    text-anchor="middle"
    font-family="'Barlow', Arial Black, sans-serif"
    font-weight="900" font-size="44" fill="#0b2860" letter-spacing="0.5"
  >PRIVATE BOXING</text>

  <rect x="34" y="364" width="272" height="42" rx="5" fill="#1f52bb"/>
  <text x="170" y="394"
    text-anchor="middle"
    font-family="'Barlow', Arial Black, sans-serif"
    font-weight="900" font-size="26" fill="white" letter-spacing="8"
  >ZÜRICH</text>

  <text x="170" y="446"
    text-anchor="middle"
    font-family="'Barlow', Georgia, sans-serif"
    font-weight="700" font-size="18" fill="#2a4070" letter-spacing="0.3"
  >Boxen statt Therapie.</text>

</svg>
</div>

<!-- DARK -->
<div class="card dark">
<svg width="340" height="490" viewBox="0 0 340 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="oval-d">
      <ellipse cx="170" cy="162" rx="155" ry="148"/>
    </clipPath>
    <linearGradient id="bar-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfe3fa"/>
    </linearGradient>
    <linearGradient id="diag-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a0ccff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#5090e0" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="shadow-d">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#3a70ff" flood-opacity="0.20"/>
    </filter>
  </defs>

  <ellipse cx="170" cy="162" rx="160" ry="153" fill="#0b2860" filter="url(#shadow-d)"/>
  <ellipse cx="170" cy="162" rx="153" ry="146" fill="none" stroke="#3060cc" stroke-width="3.5"/>
  <ellipse cx="170" cy="162" rx="143" ry="136" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="1.5"/>

  <g clip-path="url(#oval-d)">
    <g fill="rgba(0,0,0,0.25)" transform="translate(4,6)">
      <rect x="96"  y="38"  width="42" height="248" rx="5"/>
      <rect x="202" y="38"  width="42" height="248" rx="5"/>
      <rect x="58"  y="112" width="224" height="42" rx="5"/>
      <rect x="58"  y="182" width="224" height="42" rx="5"/>
    </g>
    <g fill="url(#bar-d)">
      <rect x="96"  y="38"  width="42" height="248" rx="5"/>
      <rect x="202" y="38"  width="42" height="248" rx="5"/>
      <rect x="58"  y="112" width="224" height="42" rx="5"/>
      <rect x="58"  y="182" width="224" height="42" rx="5"/>
    </g>
    <line x1="238" y1="36" x2="102" y2="286"
      stroke="url(#diag-d)" stroke-width="36" stroke-linecap="square"/>
    <g stroke="rgba(3,16,60,0.14)" stroke-width="2.5" fill="none">
      <rect x="101" y="43"  width="32" height="238" rx="4"/>
      <rect x="207" y="43"  width="32" height="238" rx="4"/>
      <rect x="63"  y="117" width="214" height="32" rx="4"/>
      <rect x="63"  y="187" width="214" height="32" rx="4"/>
    </g>
    <rect x="138" y="38"  width="64" height="74"  fill="#0b2860"/>
    <rect x="138" y="224" width="64" height="62"  fill="#0b2860"/>
  </g>

  <text x="170" y="354"
    text-anchor="middle"
    font-family="'Barlow', Arial Black, sans-serif"
    font-weight="900" font-size="44" fill="white" letter-spacing="0.5"
  >PRIVATE BOXING</text>

  <rect x="34" y="364" width="272" height="42" rx="5" fill="#1f52bb"/>
  <text x="170" y="394"
    text-anchor="middle"
    font-family="'Barlow', Arial Black, sans-serif"
    font-weight="900" font-size="26" fill="white" letter-spacing="8"
  >ZÜRICH</text>

  <text x="170" y="446"
    text-anchor="middle"
    font-family="'Barlow', Georgia, sans-serif"
    font-weight="700" font-size="18"
    fill="rgba(170,200,255,0.88)" letter-spacing="0.3"
  >Boxen statt Therapie.</text>

</svg>
</div>

</body>
</html>
