<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Private Boxing Zürich – Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Black+Han+Sans&family=Anton&family=Bebas+Neue&family=Barlow+Condensed:wght@800;900&family=Barlow:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
</style>
</head>
<body>

<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <circle cx="250" cy="250" r="224"/>
    </clipPath>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a3564" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="zurich-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3a5fa8" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#3a5fa8" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#3a5fa8" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#3a5fa8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3a5fa8" stop-opacity="0"/>
    </linearGradient>

    <!-- Handschuh Farbverläufe -->
    <radialGradient id="glove-body-grad" cx="30%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#a0c8f8"/>
      <stop offset="45%"  stop-color="#4a7ac8"/>
      <stop offset="100%" stop-color="#1a3564"/>
    </radialGradient>
    <radialGradient id="glove-top-grad" cx="38%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#c0e0ff"/>
      <stop offset="55%"  stop-color="#3a6ab8"/>
      <stop offset="100%" stop-color="#1a3564"/>
    </radialGradient>
    <linearGradient id="glove-cuff-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a4a88"/>
      <stop offset="100%" stop-color="#0e2448"/>
    </linearGradient>
    <linearGradient id="glove-arm-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d0ddf0"/>
      <stop offset="100%" stop-color="#9aaac8"/>
    </linearGradient>
  </defs>


  <!-- Blauer Kreis -->
  <circle cx="250" cy="250" r="240" fill="#1a3564" stroke="#7ec8ff" stroke-width="5"/>


  <!-- PRIVATE -->
  <text
    x="250" y="145"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Bebas Neue', sans-serif"
    font-size="110"
    fill="#ffffff"
    letter-spacing="4"
  >PRIVATE</text>

  <!-- BOXING -->
  <text
    x="250" y="255"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Bebas Neue', sans-serif"
    font-size="110"
    fill="#7ec8ff"
    letter-spacing="4"
  >BOXING</text>

  <!-- ZÜRICH -->
  <text
    x="250" y="365"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Bebas Neue', sans-serif"
    font-size="110"
    fill="#ffffff"
    letter-spacing="4"
  >ZÜRICH</text>

</svg>

</body>
</html>
