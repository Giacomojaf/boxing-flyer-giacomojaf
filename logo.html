<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Private Boxing Zürich – Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Black+Han+Sans&family=Anton&family=Bebas+Neue&family=Barlow+Condensed:wght@800;900&family=Barlow:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8eaed;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
</style>
</head>
<body>

<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <circle cx="250" cy="250" r="224"/>
    </clipPath>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a3564" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="zurich-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3a5fa8" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#3a5fa8" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#3a5fa8" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#3a5fa8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3a5fa8" stop-opacity="0"/>
    </linearGradient>
  </defs>


  <!-- Blauer Kreis -->
  <circle cx="250" cy="250" r="240" fill="#1a3564"/>

  <!-- Zürich Skyline Silhouette -->
  <g fill="#7ec8ff" opacity="0.18" clip-path="url(#clip)">
    <!-- Linkes Gebäude-Cluster -->
    <rect x="78" y="408" width="22" height="27"/>
    <rect x="104" y="396" width="18" height="39"/>
    <rect x="126" y="412" width="20" height="23"/>

    <!-- Fraumünster (schlanker Spitzturm) -->
    <rect x="156" y="383" width="13" height="52"/>
    <polygon points="156,383 162.5,356 169,383"/>

    <!-- Grossmünster Turm 1 -->
    <rect x="196" y="370" width="21" height="65"/>
    <polygon points="196,370 206.5,348 217,370"/>

    <!-- Grossmünster Turm 2 -->
    <rect x="225" y="370" width="21" height="65"/>
    <polygon points="225,370 235.5,348 246,370"/>

    <!-- Kirchenschiff Grossmünster -->
    <rect x="196" y="398" width="50" height="12"/>

    <!-- Mittleres Gebäude -->
    <rect x="262" y="400" width="26" height="35"/>
    <rect x="294" y="390" width="18" height="45"/>
    <rect x="318" y="407" width="22" height="28"/>

    <!-- Kleiner Kirchturm rechts -->
    <rect x="348" y="391" width="11" height="44"/>
    <polygon points="348,391 353.5,372 359,391"/>

    <rect x="366" y="410" width="20" height="25"/>

    <!-- Boden -->
    <rect x="60" y="435" width="380" height="6" rx="2"/>
  </g>

  <!-- PRIVATE BOXING -->
  <text
    x="250" y="205"
    text-anchor="middle"
    font-family="'Russo One', sans-serif"
    font-size="48"
    fill="#ffffff"
    letter-spacing="2"
  >PRIVATE BOXING</text>

  <!-- Linker Boxhandschuh -->
  <g fill="#ffffff">
    <rect x="44" y="256" width="22" height="17" rx="4"/>
    <ellipse cx="72" cy="250" rx="16" ry="13"/>
    <ellipse cx="81" cy="239" rx="8" ry="6" transform="rotate(-20 81 239)"/>
  </g>

  <!-- Rechter Boxhandschuh (gespiegelt) -->
  <g fill="#ffffff" transform="translate(500,0) scale(-1,1)">
    <rect x="44" y="256" width="22" height="17" rx="4"/>
    <ellipse cx="72" cy="250" rx="16" ry="13"/>
    <ellipse cx="81" cy="239" rx="8" ry="6" transform="rotate(-20 81 239)"/>
  </g>

  <!-- ZÜRICH -->
  <text
    x="250" y="258"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Bebas Neue', sans-serif"
    font-size="58"
    fill="#7ec8ff"
    letter-spacing="2"
  >ZÜRICH</text>

  <!-- Boxen statt Therapie -->
  <text
    x="250" y="335"
    text-anchor="middle"
    font-family="'Barlow', sans-serif"
    font-style="italic"
    font-weight="700"
    font-size="37"
    fill="#ffffff"
    letter-spacing="1"
  >Boxen statt Therapie</text>

</svg>

</body>
</html>
