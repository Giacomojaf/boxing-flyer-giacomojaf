<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Feed Ad – Private Boxing Zürich</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #08152a;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
  }

  /* ── VIDEO HINTERGRUND ── */
  .bg-video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center center;
    z-index: 0;
  }

  /* ── OVERLAY ── */
  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(8,21,42,0.60) 0%,
        rgba(8,21,42,0.20) 35%,
        rgba(8,21,42,0.70) 65%,
        rgba(8,21,42,0.98) 100%
      );
    z-index: 1;
  }

  /* ── DEKOELEMENTE ── */
  .accent-line {
    position: absolute; top: 0; left: 68px;
    width: 3px; height: 100%;
    background: linear-gradient(to bottom, transparent 4%, #3a8fff 28%, #7ec8ff 62%, transparent 96%);
    z-index: 5; opacity: 0.45;
  }
  .frame {
    position: absolute; inset: 20px;
    border: 2px solid rgba(126,200,255,0.20);
    border-radius: 6px;
    z-index: 5;
    pointer-events: none;
  }
  .frame::before, .frame::after {
    content: '';
    position: absolute;
    width: 52px; height: 52px;
    border-color: #7ec8ff;
    border-style: solid;
    opacity: 0.80;
  }
  .frame::before { top:-2px; left:-2px; border-width:4px 0 0 4px; border-radius:4px 0 0 0; }
  .frame::after  { bottom:-2px; right:-2px; border-width:0 4px 4px 0; border-radius:0 0 4px 0; }

  .glow-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 12px;
    background: linear-gradient(90deg, transparent 3%, #1e60cc 25%, #7ec8ff 50%, #1e60cc 75%, transparent 97%);
    z-index: 10;
    box-shadow: 0 -4px 20px rgba(126,200,255,0.45);
  }

  /* ── CONTENT ── */
  .content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 0 60px 44px 108px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* Hook */
  .hook {
    font-size: 30px;
    font-weight: 700;
    color: rgba(200,232,255,0.85);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }

  /* Headline */
  .headline {
    display: flex;
    align-items: baseline;
    gap: 20px;
    line-height: 1;
  }
  .hl-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    color: #fff;
    letter-spacing: 0.04em;
    line-height: 0.88;
  }
  .hl-accent { color: #7ec8ff; }

  .divider {
    width: 70px; height: 3px;
    background: linear-gradient(90deg, #7ec8ff, transparent);
  }

  /* Benefits */
  .benefit-list {
    display: flex;
    gap: 0;
    flex-direction: column;
    gap: 12px;
  }
  .benefit-item {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }
  .benefit-item span { color: #7ec8ff; margin-right: 10px; }

  /* CTA */
  .cta-main {
    background: linear-gradient(100deg, #1a65d6 0%, #0e3f9a 100%);
    border: 2px solid rgba(126,200,255,0.55);
    border-radius: 12px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 10px 40px rgba(30,100,220,0.60);
  }
  .cta-left {}
  .cta-label {
    font-size: 16px; font-weight: 800;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #c8e8ff; margin-bottom: 4px;
  }
  .cta-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; letter-spacing: 0.05em;
    color: #fff; line-height: 1;
  }
  .cta-text span { color: #7ec8ff; }
  .cta-price {
    text-align: right;
  }
  .price-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: #fff;
    line-height: 1;
    letter-spacing: 0.03em;
  }
  .price-sub {
    font-size: 16px;
    font-weight: 700;
    color: #9dd8ff;
    letter-spacing: 0.05em;
  }

  /* Tags */
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tag-row { display: flex; gap: 10px; }
  .tag {
    font-size: 16px; font-weight: 700;
    padding: 7px 16px; border-radius: 50px;
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.28);
    color: #fff;
  }
  .tag-blue {
    background: rgba(58,143,255,0.26);
    border: 1.5px solid rgba(126,200,255,0.55);
  }
  .handle {
    color: #7ec8ff; font-size: 20px;
    font-weight: 800; letter-spacing: 0.02em;
  }

  /* TOP badge */
  .top-badge {
    position: absolute;
    top: 52px; left: 108px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dot {
    width: 10px; height: 10px;
    background: #7ec8ff;
    border-radius: 50%;
    box-shadow: 0 0 10px #7ec8ff;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.5; transform:scale(1.6); }
  }
  .location-text {
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  }
</style>
</head>
<body>
<div class="canvas">

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="../dfebea86-2353-4af3-82f7-b541f27e3105.MP4" type="video/mp4">
  </video>

  <div class="overlay"></div>
  <div class="accent-line"></div>
  <div class="frame"></div>
  <div class="glow-bar"></div>

  <!-- TOP -->
  <div class="top-badge">
    <span class="dot"></span>
    <span class="location-text">Zürich Altstetten · Privates Boxing</span>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="hook">Therapie war gestern. 🥊</div>

    <div class="headline">
      <div>
        <span class="hl-main" style="display:block;">1:1</span>
        <span class="hl-main" style="display:block;"><span class="hl-accent">BOXING</span> TRAINING</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="benefit-list">
      <div class="benefit-item"><span>✓</span>Für Berufstätige — flexibel nach deinem Plan</div>
      <div class="benefit-item"><span>✓</span>Im Gym, draussen oder online</div>
      <div class="benefit-item"><span>✓</span>Alle Level willkommen</div>
    </div>

    <div class="cta-main">
      <div class="cta-left">
        <div class="cta-label">Plätze begrenzt — jetzt sichern</div>
        <div class="cta-text">DM <span>@giacomojaf</span></div>
      </div>
      <div class="cta-price">
        <div class="price-big">CHF 80.–</div>
        <div class="price-sub">pro Session</div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="tag-row">
        <div class="tag tag-blue">🥊 1:1 Training</div>
        <div class="tag">Alle Level</div>
      </div>
      <div class="handle">@giacomojaf</div>
    </div>

  </div>

</div>
</body>
</html>
