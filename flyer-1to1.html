<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>1:1 Boxing Training – @giacomojaf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@1,800&family=Inter:wght@600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #08152a;
  }

  /* ── FOTO rechts ab Mitte ── */
  .photo {
    position: absolute;
    top: 0; right: 0;
    width: 700px; height: 100%;
    background:
      url('../WhatsApp Image 2026-04-09 at 23.42.57.jpeg')
      40% 8% / cover no-repeat;
    transform: scaleX(-1);
    z-index: 1;
  }
  .photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, #08152a 0%, rgba(8,21,42,0.85) 30%, rgba(8,21,42,0.30) 60%, transparent 80%),
      linear-gradient(to top, #08152a 0%, transparent 20%),
      rgba(0,15,50,0.40);
  }

  /* ── ACCENT LINE ── */
  .accent-line {
    position: absolute; top: 0; left: 68px;
    width: 3px; height: 100%;
    background: linear-gradient(to bottom, transparent 4%, #3a8fff 28%, #7ec8ff 62%, transparent 96%);
    z-index: 5; opacity: 0.45;
  }

  /* ── FRAME ── */
  .frame {
    position: absolute; inset: 20px;
    border: 2px solid rgba(126,200,255,0.20);
    border-radius: 6px;
    z-index: 5;
    pointer-events: none;
  }
  .frame::before, .frame::after {
    content: '';
    position: absolute;
    width: 52px; height: 52px;
    border-color: #7ec8ff;
    border-style: solid;
    opacity: 0.80;
  }
  .frame::before {
    top: -2px; left: -2px;
    border-width: 4px 0 0 4px;
    border-radius: 4px 0 0 0;
  }
  .frame::after {
    bottom: -2px; right: -2px;
    border-width: 0 4px 4px 0;
    border-radius: 0 0 4px 0;
  }

  /* ── GLOW BAR ── */
  .glow-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 12px;
    background: linear-gradient(90deg, transparent 3%, #1e60cc 25%, #7ec8ff 50%, #1e60cc 75%, transparent 97%);
    z-index: 10;
    box-shadow: 0 -4px 20px rgba(126,200,255,0.45);
  }

  /* ── CONTENT ── */
  .content {
    position: absolute;
    top: 0; left: 0;
    width: 750px; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    padding: 50px 50px 40px 88px;
  }

  /* TOP */
  .location-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    margin-bottom: 0;
  }
  .dot {
    flex-shrink: 0;
    width: 9px; height: 9px;
    background: #7ec8ff;
    border-radius: 50%;
    box-shadow: 0 0 8px #7ec8ff;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.5; transform:scale(1.6); }
  }

  /* MIDDLE */
  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 30px;
  }

  .headline { line-height: 0.90; }
  .hl-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 130px;
    color: #fff;
    display: block;
    letter-spacing: 0.04em;
  }
  .hl-accent { color: #7ec8ff; }

  .divider {
    width: 70px;
    height: 3px;
    background: linear-gradient(90deg, #7ec8ff, transparent);
  }

  .benefit-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .benefit-item {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    letter-spacing: 0.01em;
    line-height: 1.3;
  }
  .benefit-item span {
    color: #7ec8ff;
    margin-right: 10px;
  }

  /* BOTTOM */
  .bottom {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .cta-main {
    background: linear-gradient(100deg, #1a65d6 0%, #0e3f9a 100%);
    border: 2px solid rgba(126,200,255,0.55);
    border-radius: 12px;
    padding: 20px 28px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(30,100,220,0.60);
  }
  .cta-top-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #c8e8ff;
    margin-bottom: 4px;
  }
  .cta-main-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px;
    letter-spacing: 0.05em;
    color: #fff;
    line-height: 1;
  }
  .cta-main-text span { color: #7ec8ff; }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tag-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .tag {
    font-size: 16px;
    font-weight: 700;
    padding: 7px 16px;
    border-radius: 50px;
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.28);
    color: #fff;
  }
  .tag-blue {
    background: rgba(58,143,255,0.26);
    border: 1.5px solid rgba(126,200,255,0.55);
  }
  .handle {
    color: #7ec8ff;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- FOTO -->
  <div class="photo"></div>

  <!-- DEKOELEMENTE -->
  <div class="accent-line"></div>
  <div class="frame"></div>
  <div class="glow-bar"></div>

  <!-- CONTENT -->
  <div class="content">

    <div class="location-pill">
      <span class="dot"></span>
      Zürich · Privates Boxing
    </div>

    <div class="middle">
      <div class="headline">
        <span class="hl-main">1:1</span>
        <span class="hl-main"><span class="hl-accent">BOXING</span></span>
        <span class="hl-main">TRAINING</span>
      </div>

      <div class="divider"></div>

      <div class="benefit-list">
        <div class="benefit-item"><span>✓</span>Boxen von A bis Z — alle Level</div>
        <div class="benefit-item"><span>✓</span>Im Gym, Umgebung oder Online</div>
        <div class="benefit-item"><span>✓</span>Flexibel in Ort und Zeit</div>
      </div>
    </div>

    <div class="bottom">
      <div class="cta-main">
        <div class="cta-top-text">Plätze begrenzt — jetzt sichern</div>
        <div class="cta-main-text">DM <span>@giacomojaf</span> FÜR TERMIN</div>
      </div>
      <div class="bottom-row">
        <div class="tag-row">
          <div class="tag tag-blue">🥊 1:1 Training</div>
          <div class="tag">Alle Level</div>
        </div>
        <div class="handle">@giacomojaf</div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
