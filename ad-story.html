<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story Ad – Private Boxing Zürich</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #08152a;
  }

  .canvas {
    width: 1080px;
    height: 1920px;
    position: relative;
  }

  /* ── VIDEO HINTERGRUND ── */
  .bg-video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center center;
    z-index: 0;
  }

  /* ── OVERLAY ── */
  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(8,21,42,0.75) 0%,
        rgba(8,21,42,0.30) 30%,
        rgba(8,21,42,0.30) 60%,
        rgba(8,21,42,0.95) 85%,
        rgba(8,21,42,1.00) 100%
      );
    z-index: 1;
  }

  /* ── DEKOELEMENTE ── */
  .accent-line {
    position: absolute; top: 0; left: 68px;
    width: 3px; height: 100%;
    background: linear-gradient(to bottom, transparent 4%, #3a8fff 20%, #7ec8ff 50%, transparent 96%);
    z-index: 5; opacity: 0.45;
  }
  .frame {
    position: absolute; inset: 28px;
    border: 2px solid rgba(126,200,255,0.18);
    border-radius: 8px;
    z-index: 5;
    pointer-events: none;
  }
  .frame::before, .frame::after {
    content: '';
    position: absolute;
    width: 60px; height: 60px;
    border-color: #7ec8ff;
    border-style: solid;
    opacity: 0.80;
  }
  .frame::before { top:-2px; left:-2px; border-width:4px 0 0 4px; border-radius:4px 0 0 0; }
  .frame::after  { bottom:-2px; right:-2px; border-width:0 4px 4px 0; border-radius:0 0 4px 0; }

  .glow-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 14px;
    background: linear-gradient(90deg, transparent 3%, #1e60cc 25%, #7ec8ff 50%, #1e60cc 75%, transparent 97%);
    z-index: 10;
    box-shadow: 0 -6px 28px rgba(126,200,255,0.50);
  }

  /* ── TOP AREA ── */
  .top {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 80px 80px 0 108px;
  }

  .location-pill {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  }
  .dot {
    width: 11px; height: 11px;
    background: #7ec8ff;
    border-radius: 50%;
    box-shadow: 0 0 10px #7ec8ff;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.5; transform:scale(1.6); }
  }

  /* ── BOTTOM CONTENT ── */
  .bottom-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 0 80px 80px 108px;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  /* Hook */
  .hook {
    font-size: 38px;
    font-weight: 700;
    color: rgba(200,232,255,0.85);
    letter-spacing: 0.02em;
    line-height: 1.4;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }

  /* Headline */
  .headline { line-height: 0.88; }
  .hl-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 168px;
    color: #fff;
    display: block;
    letter-spacing: 0.04em;
  }
  .hl-accent { color: #7ec8ff; }

  .divider {
    width: 80px; height: 3px;
    background: linear-gradient(90deg, #7ec8ff, transparent);
  }

  /* Benefits */
  .benefit-list { display: flex; flex-direction: column; gap: 22px; }
  .benefit-item {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    line-height: 1.3;
  }
  .benefit-item span { color: #7ec8ff; margin-right: 12px; }

  /* CTA */
  .cta-main {
    background: linear-gradient(100deg, #1a65d6 0%, #0e3f9a 100%);
    border: 2px solid rgba(126,200,255,0.55);
    border-radius: 16px;
    padding: 30px 40px;
    text-align: center;
    box-shadow: 0 12px 50px rgba(30,100,220,0.65);
  }
  .cta-top-text {
    font-size: 22px; font-weight: 800;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #c8e8ff; margin-bottom: 6px;
  }
  .cta-main-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 62px; letter-spacing: 0.05em;
    color: #fff; line-height: 1;
  }
  .cta-main-text span { color: #7ec8ff; }

  /* Tags */
  .tag-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .tag {
    font-size: 20px; font-weight: 700;
    padding: 10px 22px; border-radius: 50px;
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.28);
    color: #fff;
  }
  .tag-blue {
    background: rgba(58,143,255,0.26);
    border: 1.5px solid rgba(126,200,255,0.55);
  }
</style>
</head>
<body>
<div class="canvas">

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="../dfebea86-2353-4af3-82f7-b541f27e3105.MP4" type="video/mp4">
  </video>

  <div class="overlay"></div>
  <div class="accent-line"></div>
  <div class="frame"></div>
  <div class="glow-bar"></div>

  <!-- TOP -->
  <div class="top">
    <div class="location-pill">
      <span class="dot"></span>
      Zürich Altstetten · Privates Boxing
    </div>
  </div>

  <!-- BOTTOM CONTENT -->
  <div class="bottom-content">

    <div class="hook">Therapie war gestern.</div>

    <div class="headline">
      <span class="hl-main">1:1</span>
      <span class="hl-main"><span class="hl-accent">BOXING</span></span>
      <span class="hl-main">TRAINING</span>
    </div>

    <div class="divider"></div>

    <div class="benefit-list">
      <div class="benefit-item"><span>✓</span>Für Berufstätige in Altstetten</div>
      <div class="benefit-item"><span>✓</span>Im Gym, draussen oder online</div>
      <div class="benefit-item"><span>✓</span>Alle Level willkommen</div>
    </div>

    <div class="cta-main">
      <div class="cta-top-text">Plätze begrenzt — jetzt sichern</div>
      <div class="cta-main-text">DM <span>@giacomojaf</span></div>
    </div>

    <div class="tag-row">
      <div class="tag tag-blue">🥊 Ab CHF 80.– / Session</div>
      <div class="tag">Alle Level</div>
    </div>

  </div>

</div>
</body>
</html>
