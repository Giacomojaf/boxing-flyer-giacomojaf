<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloves Design – Private Boxing Zürich</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #08152a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    gap: 60px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(126,200,255,0.5);
    margin-bottom: 24px;
    text-align: center;
  }
  .glove-wrap {
    position: relative;
    display: inline-block;
  }
  .glove-wrap img {
    width: 500px;
    display: block;
    filter: hue-rotate(200deg) saturate(1.2) brightness(0.85);
  }
  /* Logo overlay on right glove palm */
  .logo-overlay-palm {
    position: absolute;
    top: 17%;
    right: 6%;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: rgba(8,21,42,0.55);
    border: 1.8px solid rgba(126,200,255,0.40);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0px;
    backdrop-filter: blur(2px);
  }
  /* Logo overlay on right glove wrist */
  .logo-overlay-wrist {
    position: absolute;
    bottom: 13%;
    right: 12%;
    width: 74px;
    height: 74px;
    border-radius: 50%;
    background: rgba(8,21,42,0.55);
    border: 1.2px solid rgba(126,200,255,0.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .logo-line1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.10em;
    color: #fff;
    line-height: 1;
  }
  .logo-line2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: #7ec8ff;
    line-height: 1;
  }
  .logo-line3 {
    font-family: 'Inter', sans-serif;
    font-size: 6px;
    font-weight: 600;
    color: rgba(200,232,255,0.65);
    letter-spacing: 0.06em;
    margin-top: 3px;
  }
  .logo-line1-sm { font-family: 'Bebas Neue', sans-serif; font-size: 7px; letter-spacing: 0.08em; color: #fff; line-height: 1; }
  .logo-line2-sm { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 0.06em; color: #7ec8ff; line-height: 1; }
  .logo-line3-sm { font-family: 'Inter', sans-serif; font-size: 4.5px; font-weight: 600; color: rgba(200,232,255,0.60); margin-top: 2px; }

  /* WRAP */
  .wrap-wrap {
    position: relative;
    display: inline-block;
  }
  .wrap-wrap img {
    width: 680px;
    display: block;
    filter: hue-rotate(200deg) saturate(1.2) brightness(0.85);
  }
  .logo-overlay-wrap {
    position: absolute;
    top: 50%;
    left: 30%;
    transform: translate(-50%, -50%);
    width: 130px;
    height: 70px;
    border-radius: 35px;
    background: rgba(8,21,42,0.55);
    border: 1.2px solid rgba(126,200,255,0.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
</style>
